name = "shade"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Create with: wrangler kv namespace create ROLE_MENUS
# Then paste the returned id below.
[[kv_namespaces]]
binding = "ROLE_MENUS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Secrets (set via `wrangler secret put <NAME>`, never stored here):
#   DISCORD_TOKEN
#   DISCORD_PUBLIC_KEY
#   DISCORD_APPLICATION_ID
